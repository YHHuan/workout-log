<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訓練日誌</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div>
                    <h1>💪 訓練日誌</h1>
                    <p class="subtitle" id="todayDate"></p>
                </div>
                <div class="unit-toggle">
                    <button id="unitToggleBtn" class="unit-toggle-btn">⚖️ 切換單位 (kg)</button>
                </div>
            </div>
        </header>

        <!-- Add New Exercise Button -->
        <section class="add-exercise-section">
            <button id="addExerciseBtn" class="btn-add-exercise">+ 新增動作</button>
        </section>

        <!-- Add Exercise Modal -->
        <div id="addExerciseModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>新增訓練動作</h2>
                    <button class="modal-close" onclick="closeAddExerciseModal()">&times;</button>
                </div>
                <form id="addExerciseForm" class="modal-form">
                    <div class="form-group">
                        <label for="newExerciseName">動作名稱</label>
                        <input type="text" id="newExerciseName" placeholder="例：保加利亞分腿蹲" required>
                    </div>
                    <div class="form-group">
                        <label for="newExerciseCategory">分類（可選）</label>
                        <input type="text" id="newExerciseCategory" placeholder="例：腿部推">
                    </div>
                    <div class="form-group">
                        <label for="newExerciseNotes">動作要領（可選）</label>
                        <textarea id="newExerciseNotes" placeholder="記錄動作要領或注意事項..."></textarea>
                    </div>
                    <div class="modal-buttons">
                        <button type="submit" class="btn-submit">✅ 新增</button>
                        <button type="button" class="btn-cancel" onclick="closeAddExerciseModal()">❌ 取消</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Exercises Grid -->
        <section class="exercises-section">
            <div id="exercisesGrid" class="exercises-grid"></div>
        </section>

        <!-- Info Section -->
        <section class="info-section">
            <h2>使用說明</h2>
            <div class="info-cards">
                <div class="info-card">
                    <h3>📝 紀錄訓練</h3>
                    <p>點擊動作卡片下方的「展開紀錄」按鈕，輸入重量、組數、次數，點擊「保存」即可記錄。</p>
                </div>
                <div class="info-card">
                    <h3>⚖️ 單位切換</h3>
                    <p>點擊右上角「切換單位」按鈕，可在公斤 (kg) 和磅 (lb) 之間切換。</p>
                </div>
                <div class="info-card">
                    <h3>➕ 新增動作</h3>
                    <p>點擊「新增動作」按鈕，建立自己的訓練動作模板。</p>
                </div>
                <div class="info-card">
                    <h3>📊 查看歷史</h3>
                    <p>展開紀錄後，可查看該動作的最近訓練紀錄，方便追蹤進度。</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>💡 持續記錄，穩步進步。每一次的努力都在累積力量。</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
